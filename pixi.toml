[project]
name = "breast-cancer-detection"
version = "0.1.0"
description = "Adapting the Mammo-CLIP foundation model for breast cancer detection on screening mammography"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
pandas = ">=2.0"
scikit-learn = ">=1.3"
matplotlib = ">=3.7"
opencv = ">=4.8"
tqdm = ">=4.65"
pydicom = ">=2.4"

[pypi-dependencies]
torch = ">=2.0"
torchvision = ">=0.15"
efficientnet-pytorch = "==0.7.1"
huggingface-hub = ">=0.20"
pylibjpeg = "*"
pylibjpeg-libjpeg = "*"
pylibjpeg-openjpeg = "*"
python-gdcm = "*"
kaggle = ">=1.6"

[tasks]
build-train = "python scripts/build_notebook_multihead.py kaggle/train_multihead/rsna-mammoclip-multihead.ipynb"
build-cache = "python scripts/build_cache_kernel.py kaggle/build_cache/rsna-build-cache-1024.ipynb"
